<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banderas de playa - La Manga a tus pies</title>
<style>
  :root {
    --bg: #ffffff;
    --card-bg: #ffffff;
    --header-bg: #eaf2fc;
    --header-text: #185fa5;
    --grupo-bg: #f4f7fa;
    --grupo-text: #4a5568;
    --text: #1a1a1a;
    --text-secondary: #6b6b6b;
    --border: #e2e2e2;
    --link-hover: #f5f8fc;
    --verde-bg: #e6f7ec; --verde-text: #1a7a41;
    --amarilla-bg: #fff8e1; --amarilla-text: #8a6d00;
    --roja-bg: #fdeceb; --roja-text: #b53228;
    --gris-bg: #f0f0f0; --gris-text: #757575;
  }
  html[data-tema="oscuro"] {
    --bg: #0d1117;
    --card-bg: #0d1117;
    --header-bg: #132030;
    --header-text: #7fb2e8;
    --grupo-bg: #131b24;
    --grupo-text: #b0bac5;
    --text: #e6edf3;
    --text-secondary: #9aa5b1;
    --border: #24303d;
    --link-hover: #16202b;
    --verde-bg: rgba(46,204,113,0.12); --verde-text: #4fd47c;
    --amarilla-bg: rgba(241,196,15,0.12); --amarilla-text: #f1c40f;
    --roja-bg: rgba(231,76,60,0.12); --roja-text: #ff6b5e;
    --gris-bg: rgba(255,255,255,0.06); --gris-text: #9aa5b1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .widget {
    max-width: 480px;
    margin: 0 auto;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .widget-header {
    background: var(--header-bg);
    color: var(--header-text);
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .widget-credito {
    font-size: 11px;
    font-weight: 400;
    color: var(--header-text);
    opacity: 0.8;
    white-space: nowrap;
  }
  .widget-credito a {
    color: inherit;
  }
  .grupo-titulo {
    padding: 8px 16px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--grupo-text);
    font-weight: 700;
    background: var(--grupo-bg);
    border-top: 1px solid var(--border);
  }
  .grupo-titulo:first-child {
    border-top: none;
  }
  .fila-playa {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    transition: background 0.15s;
  }
  .fila-playa:hover { background: var(--link-hover); }
  .fila-icono {
    width: 22px;
    height: 30px;
    flex-shrink: 0;
    object-fit: contain;
  }
  .fila-info {
    flex: 1;
    min-width: 0;
  }
  .fila-nombre-linea {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fila-nombre {
    font-weight: 500;
  }
  .fila-meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .estado-color { font-weight: 600; }
  .estado-color.verde { color: var(--verde-text); }
  .estado-color.amarilla { color: var(--amarilla-text); }
  .estado-color.roja { color: var(--roja-text); }
  .estado-carga, .estado-error {
    padding: 24px 16px;
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="widget-header">
      <span>Estado de las banderas de playa</span>
      <span class="widget-credito">Datos: <a href="https://lamangaatuspies.com" target="_blank" rel="noopener">lamangaatuspies.com</a></span>
    </div>
    <div id="contenido">
      <div class="estado-carga">Cargando estado de las playas…</div>
    </div>
  </div>

<script>
(function () {
  // Tema: ?tema=oscuro en la URL del iframe activa el tema oscuro. Por defecto, claro.
  var params = new URLSearchParams(window.location.search);
  var tema = params.get('tema') === 'oscuro' ? 'oscuro' : 'claro';
  document.documentElement.setAttribute('data-tema', tema);

  var COORDENADAS_PLAYAS = {
    'BARCO PERDIDO III (ZEUS)':                  { lat: 37.63902, lng: -0.70723 },
    'CALA DEL BARCO':                            { lat: 37.58740, lng: -0.79263 },
    'CALA DEL PINO':                             { lat: 37.66692, lng: -0.73221 },
    'CAVANNA':                                   { lat: 37.65939, lng: -0.72451 },
    'GALUA':                                     { lat: 37.65928, lng: -0.72069 },
    'LA GOLA':                                   { lat: 37.65070, lng: -0.72279 },
    'PUERTO BELLO':                              { lat: 37.64824, lng: -0.71926 },
    'SIRENAS':                                   { lat: 37.64327, lng: -0.71140 },
    'ENTREMARES':                                { lat: 37.64865, lng: -0.71474 },
    'BANCO DEL TABAL (LIMA 5)':                  { lat: 37.67197, lng: -0.72843 },
    'BARNUEVO (LIMA 1)':                         { lat: 37.79665, lng: -0.80292 },
    'CASTILLICOS (LIMA 4)':                      { lat: 37.81286, lng: -0.79268 },
    'COLON I (SUR) (LIMA 2)':                    { lat: 37.80164, lng: -0.80101 },
    'COLON II (NORTE) (LIMA 3)':                 { lat: 37.80632, lng: -0.79802 },
    'EL ARENAL I (SUR) (LIMA 9)':                { lat: 37.70517, lng: -0.74010 },
    'EL ARENAL II (NORTE) (LIMA 10)':            { lat: 37.71483, lng: -0.74088 },
    'ENSENADA DEL ESPARTO (CENTRO) (LIMA 14)':   { lat: 37.75608, lng: -0.74336 },
    'ENSENADA DEL ESPARTO (NORTE) (LIMA 15)':    { lat: 37.76469, lng: -0.74669 },
    'ENSENADA DEL ESPARTO (SUR) (LIMA 13)':      { lat: 37.74855, lng: -0.73377 },
    'ESTACIO (NORTE) (LIMA 12)':                 { lat: 37.73174, lng: -0.73830 },
    'ESTACIO (SUR) (LIMA 11)':                   { lat: 37.72478, lng: -0.73911 },
    'LEBECHE (MAR MENOR) (LIMA 19)':             { lat: 37.68576, lng: -0.73709 },
    'MISTRAL (MAR MENOR) (LIMA 17)':             { lat: 37.73708, lng: -0.73880 },
    'PEDRUCHILLO (MAR MENOR) (LIMA 18)':         { lat: 37.70613, lng: -0.74327 },
    'PEDRUCHO I (SUR) (LIMA 6)':                 { lat: 37.67975, lng: -0.73187 },
    'PEDRUCHO II (CENTRO) (LIMA 7)':             { lat: 37.68758, lng: -0.73481 },
    'PEDRUCHO III (NORTE) (LIMA 8)':             { lat: 37.69715, lng: -0.73793 },
    'VENEZIOLA (MAR MENOR) (LIMA 16)':           { lat: 37.77093, lng: -0.75006 },
  };

  var FLAGS_COPLA = { 100: '', 200: 'VERDE', 300: 'AMARILLA', 400: 'ROJA' };
  var ESTADOS_MAR_COPLA = { 0: '', 1: 'Llana', 2: 'Rizada' };

  var contenido = document.getElementById('contenido');

  function construirPlayas(items, municipio) {
    var playas = [];
    items.forEach(function (item) {
      var nombre = (item.name || '').toUpperCase().trim();
      var coords = COORDENADAS_PLAYAS[nombre];
      if (!coords) return;
      playas.push({
        nombre: item.name || '',
        bandera: FLAGS_COPLA[item.flag] || '',
        estado: ESTADOS_MAR_COPLA[item.seaState] || '',
        fecha: item.updateDate || '',
        municipio: municipio
      });
    });
    return playas;
  }

  function nombreCorto(nombre) {
    return nombre
      .replace(/^PLAYA\s+/i, '')
      .replace(/\s*\((LIMA\s*\d+|MAR MENOR)\)\s*/gi, '')
      .trim()
      .toLowerCase()
      .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }

  function claseBandera(b) {
    b = (b || '').toUpperCase();
    if (b === 'VERDE') return 'verde';
    if (b === 'AMARILLA') return 'amarilla';
    if (b === 'ROJA') return 'roja';
    return 'gris';
  }

  function textoBandera(b) {
    b = (b || '').toUpperCase();
    if (b === 'VERDE') return 'Verde';
    if (b === 'AMARILLA') return 'Amarilla';
    if (b === 'ROJA') return 'Roja';
    return 'Sin datos';
  }

  // Mismos PNG que usa el mapa principal (carpeta Banderitas/), para que el
  // icono se vea idéntico. El widget debe alojarse en la raíz de lamangaatuspies.com
  // (junto a index.html) para que esta ruta relativa funcione.
  function iconoBanderaUrl(b) {
    b = (b || '').toUpperCase();
    if (b === 'VERDE') return 'Banderitas/Ban_Verde.png';
    if (b === 'AMARILLA') return 'Banderitas/Ban_Amarilla.png';
    if (b === 'ROJA') return 'Banderitas/Ban_Roja.png';
    return 'Banderitas/Ban_Blanca.png';
  }

  Promise.all([
    fetch("https://web-app.112rmurcia.com/copla-service/copla/BeachFlag?idmun=30035").then(function (r) { return r.json(); }).catch(function () { return []; }),
    fetch("https://web-app.112rmurcia.com/copla-service/copla/BeachFlag?idmun=30016").then(function (r) { return r.json(); }).catch(function () { return []; })
  ])
    .then(function (resultados) {
      var sanJavier = construirPlayas(resultados[0], 'San Javier');
      var cartagena = construirPlayas(resultados[1], 'Cartagena');
      var playas = sanJavier.concat(cartagena);

      if (!playas.length) {
        contenido.innerHTML = '<div class="estado-error">No se ha podido cargar el estado de las playas.</div>';
        return;
      }

      // Agrupar por municipio, conservando el orden en que aparecen en el feed
      var grupos = {};
      var ordenMunicipios = [];
      playas.forEach(function (p) {
        var mun = p.municipio || 'Otros';
        if (!grupos[mun]) {
          grupos[mun] = [];
          ordenMunicipios.push(mun);
        }
        grupos[mun].push(p);
      });
      ordenMunicipios.sort();

      var html = '';
      ordenMunicipios.forEach(function (mun) {
        html += '<div class="grupo-titulo">' + mun + '</div>';
        grupos[mun].forEach(function (p) {
          var b = (p.bandera || '').toUpperCase();
          var sinDatos = b !== 'VERDE' && b !== 'AMARILLA' && b !== 'ROJA';
          var clase = claseBandera(p.bandera);
          // target="_blank" abre el mapa en una pestaña nueva, así el usuario no
          // pierde la página del periódico (u otra web) donde está el widget.
          var url = 'https://lamangaatuspies.com/?playa=' + encodeURIComponent(p.nombre);
          var meta = sinDatos ? '' :
            '<div class="fila-meta">' +
              (p.estado ? 'Estado de la mar: <span class="estado-color ' + clase + '">' + p.estado + '</span>' : '') +
              (p.estado && p.fecha ? ' · ' : '') +
              (p.fecha ? 'Actualizado: ' + p.fecha : '') +
            '</div>';
          html += '<a class="fila-playa" href="' + url + '" target="_blank" rel="noopener" title="Pincha para ver su ubicación exacta">' +
                    '<div class="fila-info">' +
                      '<div class="fila-nombre-linea">' +
                        '<span class="fila-nombre">' + nombreCorto(p.nombre) + '</span>' +
                      '</div>' +
                      meta +
                    '</div>' +
                    '<img class="fila-icono" src="' + iconoBanderaUrl(p.bandera) + '" alt="' + textoBandera(p.bandera) + '">' +
                  '</a>';
        });
      });

      contenido.innerHTML = html;
    })
    .catch(function () {
      contenido.innerHTML = '<div class="estado-error">No se ha podido cargar el estado de las playas.</div>';
    });
})();
</script>
</body>
</html>
