<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¿Cuánto sabes? — La Manga a tus pies</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2330;
      --ink:       #e6edf3;
      --ink-mid:   #8b949e;
      --ink-dim:   #484f58;
      --accent:    #58a6ff;
      --accent2:   #f0883e;
      --accent3:   #3fb950;
      --border:    #30363d;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Rajdhani', sans-serif;
      --serif:     'Crimson Pro', serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
    }
    nav ul {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      list-style: none;
      padding: 0 3rem;
    }
    nav a {
      display: block;
      padding: 0.85rem 1.1rem;
      color: var(--ink-mid);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── LAYOUT ── */
    .game-wrap {
      padding-top: 44px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── PANEL SUPERIOR ── */
    .game-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      position: relative;
    }
    .game-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    }

    .game-ronda {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-mid);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .game-ronda span {
      color: var(--accent);
      font-size: 1.1rem;
      font-family: var(--sans);
      font-weight: 700;
    }

    .game-pregunta {
      flex: 1;
      min-width: 200px;
    }
    .game-pregunta .capa-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 0.2rem;
    }
    .game-pregunta .nombre {
      font-family: var(--sans);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .game-instruccion {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .game-score {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-mid);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: right;
      white-space: nowrap;
    }
    .game-score span {
      display: block;
      font-family: var(--sans);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent3);
      line-height: 1.1;
    }

    .btn-pista {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-pista:hover { background: rgba(240,136,62,0.12); }
    .btn-pista:disabled { opacity: 0.3; cursor: default; }

    /* ── FOTO PISTA flotante ── */
    .pista-panel {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 320px;
      height: 100%;
      z-index: 2000;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .pista-panel.visible { display: flex; }
    .pista-box {
      background: rgba(13,17,23,0.93);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent2);
      width: 100%;
      padding: 1.5rem;
      text-align: center;
      position: relative;
      pointer-events: all;
    }
    .pista-box img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .pista-aviso {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }
    .btn-cerrar-pista {
      background: transparent;
      color: var(--ink-mid);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-cerrar-pista:hover { opacity: 0.7; }

    /* ── MAPA ── */
    #game-map {
      width: 100%;
      height: 100%;
    }

    /* ── PANEL RESULTADO ── */
    .resultado-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 320px;
      height: 100%;
      z-index: 2000;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .resultado-overlay.visible { display: flex; }
    .resultado-box {
      background: rgba(13,17,23,0.93);
      border: 1px solid var(--border);
      width: 100%;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
      pointer-events: all;
    }
    .resultado-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .resultado-box.correcto::before { background: var(--accent3); }
    .resultado-box.incorrecto::before { background: #f85149; }

    .resultado-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
    .resultado-titulo {
      font-family: var(--sans);
      font-size: 1.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .resultado-box.correcto .resultado-titulo { color: var(--accent3); }
    .resultado-box.incorrecto .resultado-titulo { color: #f85149; }

    .resultado-puntos {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .resultado-nombre {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--ink-mid);
      margin-bottom: 1.5rem;
    }
    .btn-siguiente {
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.7rem 2rem;
      cursor: pointer;
      transition: opacity 0.2s;
      font-weight: 600;
    }
    .btn-siguiente:hover { opacity: 0.85; }

    /* ── PANTALLA FINAL ── */
    .final-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,17,23,0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .final-overlay.visible { display: flex; }
    .final-box {
      background: var(--surface);
      border: 1px solid var(--border);
      max-width: 480px;
      width: 90%;
      padding: 2.5rem;
      text-align: center;
      position: relative;
    }
    .final-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    }
    .final-titulo {
      font-family: var(--sans);
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }
    .final-subtitulo {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-mid);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .final-score {
      font-family: var(--sans);
      font-size: 4rem;
      font-weight: 700;
      color: var(--accent3);
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .final-score-max {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-dim);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .final-mensaje {
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--ink-mid);
      margin-bottom: 2rem;
      font-style: italic;
    }
    .final-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn-rejugar {
      background: var(--accent3);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.7rem 2rem;
      cursor: pointer;
      transition: opacity 0.2s;
      font-weight: 600;
    }
    .btn-rejugar:hover { opacity: 0.85; }
    .btn-volver {
      background: transparent;
      color: var(--ink-mid);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.7rem 2rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-volver:hover { color: var(--ink); border-color: var(--ink-mid); }

    /* cursor pointer sobre elementos del juego */
    .leaflet-interactive { cursor: pointer; }

    /* pin con letra */
    .marker-juego {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #58a6ff;
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .marker-juego.pin-correcto   { background: #3fb950; }
    .marker-juego.pin-incorrecto { background: #f85149; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>

<nav>
  <ul>
    <li><a href="index.html">Inicio</a></li>
    <li><a href="index.html#mapa">Mapa</a></li>
    <li><a href="index.html#lista">Lista</a></li>
    <li><a href="index.html#proyecto">Proyecto</a></li>
    <li><a href="index.html#contacto">Contacto</a></li>

  </ul>
</nav>

<div class="game-wrap">

  <!-- CABECERA CON PREGUNTA -->
  <div class="game-header">
    <div class="game-ronda">Ronda <span id="ronda-num">1</span> / 5</div>
    <div class="game-pregunta">
      <div class="capa-label" id="capa-label">Capa</div>
      <div class="nombre" id="lugar-nombre">—</div>
    </div>
    <div class="game-instruccion">← Localiza en el mapa la opción correcta y haz clic sobre ella</div>
    <div style="flex:1"></div>
    <button class="btn-pista" id="btn-pista">🔍 Ver pista · Resta un punto a tu acierto</button>
    <div class="game-score">Puntos<span id="score-val">0</span></div>
  </div>

  <!-- MAPA + PISTA FLOTANTE + OVERLAY RESULTADO -->
  <div style="flex:1; min-height:0; position:relative;">
    <div id="game-map" style="width:100%; height:100%;"></div>
    <!-- FOTO PISTA flotante centro-arriba -->
    <!-- POPUP PISTA -->
    <div class="pista-panel" id="pista-panel">
      <div class="pista-box">
        <img id="pista-img" src="" alt="Pista"/>
        <div class="pista-aviso">⚠ Pista usada · Acierto vale 1 punto</div>
        <button class="btn-cerrar-pista" id="btn-cerrar-pista">Cerrar ×</button>
      </div>
    </div>
    <!-- OVERLAY RESULTADO RONDA -->
    <div class="resultado-overlay" id="resultado-overlay">
      <div class="resultado-box" id="resultado-box">
        <div class="resultado-emoji" id="resultado-emoji"></div>
        <div class="resultado-titulo" id="resultado-titulo"></div>
        <div class="resultado-puntos" id="resultado-puntos"></div>
        <div class="resultado-nombre" id="resultado-nombre"></div>
        <button class="btn-siguiente" id="btn-siguiente">Siguiente ronda →</button>
      </div>
    </div>
  </div>

</div>

<!-- OVERLAY FINAL -->
<div class="final-overlay" id="final-overlay">
  <div class="final-box">
    <div class="final-titulo">Partida finalizada</div>
    <div class="final-subtitulo">¿Cuánto sabes de La Manga?</div>
    <div class="final-score" id="final-score">0</div>
    <div class="final-score-max">de 10 puntos</div>
    <div class="final-mensaje" id="final-mensaje"></div>
    <div class="final-btns">
      <button class="btn-rejugar" id="btn-rejugar">Jugar de nuevo</button>
      <a href="index.html" class="btn-volver">Volver al mapa</a>
    </div>
  </div>
</div>

const map = L.map('game-map', { zoomControl: true, attributionControl: false });
L.tileLayer('https://tms-pnoa-ma.idee.es/1.0.0/pnoa-ma/{z}/{x}/{y}.jpeg', {
  maxZoom: 20, minZoom: 10, tms: true,
  attribution: '© IGN España'
}).addTo(map);
map.setView([37.70, -0.73], 12);

// ── SHUFFLE ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── ESTILOS POLÍGONOS ──
const ESTILO_NORMAL     = { color: '#ffffff', weight: 2,   fillColor: '#58a6ff', fillOpacity: 0.55 };
const ESTILO_CORRECTO   = { color: '#ffffff', weight: 2.5, fillColor: '#3fb950', fillOpacity: 0.8  };
const ESTILO_INCORRECTO = { color: '#ffffff', weight: 2.5, fillColor: '#f85149', fillOpacity: 0.8  };

// Busca el feature GeoJSON en GEODATA por nombre
function buscarFeature(nombre) {
  for (const features of Object.values(GEODATA)) {
    const f = features.find(feat => feat.properties.name === nombre);
    if (f) return f;
  }
  return null;
}

// ── INICIAR RONDA ──
function iniciarRonda() {
  pistaUsada = false;
  respondido = false;

  // Limpiar polígonos y pins anteriores
  marcadores.forEach(m => { map.removeLayer(m.marker); map.removeLayer(m.pin); });
  marcadores = [];

  // Elegir correcto + 4 señuelos al azar
  const mezclados = shuffle(todosLosLugares);
  correcto = mezclados[0];
  const seleccion = shuffle([correcto, ...mezclados.slice(1, 5)]);

  // UI pregunta
  document.getElementById('ronda-num').textContent   = ronda;
  document.getElementById('capa-label').textContent  = correcto.capa;
  document.getElementById('lugar-nombre').textContent = correcto.nombre;
  document.getElementById('score-val').textContent   = puntos;
  document.getElementById('btn-pista').disabled      = false;
  document.getElementById('pista-panel').classList.remove('visible');
  document.getElementById('pista-img').src           = '';

  // Letras A-E para los marcadores
  const letras = ['A','B','C','D','E'];
  const boundsTotal = L.latLngBounds([]);

  seleccion.forEach((lugar, i) => {
    const feature = buscarFeature(lugar.nombre);
    if (!feature) return;

    // Polígono
    const layer = L.geoJSON(feature, { style: ESTILO_NORMAL }).addTo(map);
    const b = layer.getBounds();
    if (b.isValid()) boundsTotal.extend(b);

    // Pin con letra sobre el centroide
    const centro = b.isValid() ? b.getCenter() : L.latLng(lugar.lat, lugar.lng);
    const pin = L.marker(centro, {
      icon: L.divIcon({
        className: '',
        html: `<div class="marker-juego">${letras[i]}</div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14],
      })
    }).addTo(map);

    // Click en polígono o en pin → misma respuesta
    const onClick = () => { if (respondido) return; responder(lugar, layer); };
    layer.on('click', onClick);
    pin.on('click', onClick);

    marcadores.push({ marker: layer, pin, lugar });
  });

  // Ajustar zoom para ver los 5 polígonos
  if (boundsTotal.isValid()) {
    map.fitBounds(boundsTotal, { padding: [50, 50], maxZoom: 16 });
  }
}

// ── RESPONDER ──
function responder(lugarElegido, layerElegido) {
  respondido = true;
  const esCorrecta = lugarElegido === correcto;
  const puntosRonda = esCorrecta ? (pistaUsada ? 1 : 2) : 0;
  puntos += puntosRonda;

  // Revelar correcto e incorrecto visualmente
  marcadores.forEach(m => {
    const pinDiv = m.pin.getElement()?.querySelector('.marker-juego');
    if (m.lugar === correcto) {
      m.marker.setStyle(ESTILO_CORRECTO);
      if (pinDiv) pinDiv.classList.add('pin-correcto');
    } else if (m.lugar === lugarElegido && !esCorrecta) {
      m.marker.setStyle(ESTILO_INCORRECTO);
      if (pinDiv) pinDiv.classList.add('pin-incorrecto');
    }
  });

  // Mostrar resultado
  const overlay = document.getElementById('resultado-overlay');
  const box     = document.getElementById('resultado-box');
  box.className = 'resultado-box ' + (esCorrecta ? 'correcto' : 'incorrecto');
  document.getElementById('resultado-emoji').textContent  = esCorrecta ? '🎯' : '❌';
  document.getElementById('resultado-titulo').textContent = esCorrecta ? '¡Correcto!' : 'Incorrecto';
  document.getElementById('resultado-puntos').textContent = esCorrecta
    ? `+${puntosRonda} punto${puntosRonda > 1 ? 's' : ''}${pistaUsada ? ' (pista usada)' : ''}`
    : (() => {
        const diffLat = correcto.lat - lugarElegido.lat;
        const dist = Math.abs(diffLat);
        const direccion = diffLat > 0 ? 'norte' : 'sur';
        const lejos = dist > 0.05 ? 'Mucho más' : 'Un poquito más';
        return `${lejos} al ${direccion}`;
      })();
  document.getElementById('resultado-nombre').textContent = esCorrecta
    ? correcto.capa
    : '';

  const btnSig = document.getElementById('btn-siguiente');
  btnSig.textContent = ronda < TOTAL_RONDAS ? 'Siguiente ronda →' : 'Ver resultado final';
  overlay.classList.add('visible');
}

// ── SIGUIENTE RONDA / FINAL ──
document.getElementById('btn-siguiente').addEventListener('click', () => {
  document.getElementById('resultado-overlay').classList.remove('visible');
  if (ronda < TOTAL_RONDAS) {
    ronda++;
    iniciarRonda();
  } else {
    mostrarFinal();
  }
});

// ── FINAL ──
function mostrarFinal() {
  document.getElementById('final-score').textContent = puntos;
  const mensajes = [
    [0,  1,  'Sigue viniendo por La Manga... algo aprenderás. 😄'],
    [2,  3,  'Conoces algunos rincones, pero La Manga guarda muchos secretos.'],
    [4,  5,  'No está mal. Tienes terreno recorrido.'],
    [6,  7,  'Buen nivel. La Manga no tiene muchos secretos para ti.'],
    [8,  9,  '¡Muy bien! Te mueves por La Manga como un local.'],
    [10, 10, '¡Perfecto! Eres un auténtico experto de La Manga del Mar Menor. 🏆'],
  ];
  const msg = mensajes.find(([min, max]) => puntos >= min && puntos <= max);
  document.getElementById('final-mensaje').textContent = msg ? msg[2] : '';
  document.getElementById('final-overlay').classList.add('visible');
}

// ── REJUGAR ──
document.getElementById('btn-rejugar').addEventListener('click', () => {
  document.getElementById('final-overlay').classList.remove('visible');
  ronda  = 1;
  puntos = 0;
  iniciarRonda();
});

// ── PISTA ──
document.getElementById('btn-pista').addEventListener('click', () => {
  if (pistaUsada || respondido) return;
  pistaUsada = true;
  document.getElementById('btn-pista').disabled = true;
  document.getElementById('pista-img').src = correcto.img;
  document.getElementById('pista-panel').classList.add('visible');
});

document.getElementById('btn-cerrar-pista').addEventListener('click', () => {
  document.getElementById('pista-panel').classList.remove('visible');
});

// ── ARRANCAR ──
iniciarRonda();
</script>
